global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'kafka-producer'
    static_configs:
      - targets: ['host.docker.internal:9101'] # Match the port your app code exposes

  - job_name: 'kafka-consumer'
    static_configs:
      - targets: ['host.docker.internal:9102']

  - job_name: 'reporting-api'
    static_configs:
      # The API serves /metrics on its own Express app (API_PORT), not a separate metrics port
      - targets: ['host.docker.internal:3000']
